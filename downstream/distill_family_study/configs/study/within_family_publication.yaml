# @package _global_
# Publication-scale within-family distillation study.
#
# This config is the declarative source of truth for the README plan:
#   4 families x 3 students x 2 layer schemes x 2 regimes = 48 runs
#
# It is intentionally separate from experiment/stage_pipeline configs. The study
# layer answers "which runs should exist?" while experiment configs answer
# "how does one run execute?".

study:
  name: within_family_publication
  description: >
    Within-family PHATE-target distillation matrix across Pythia, Qwen2.5,
    BERT, and DeBERTa-v3 with fixed teachers, three student scales per family,
    staged and task-only-control regimes, and two layer-matching schemes.
  experiment: distill_family_study_template
  training_regimes:
    - staged
    - control_task_only
  family_order:
    - pythia
    - qwen
    - bert
    - deberta_v3
  layer_schemes:
    - penultimate_only
    - second_plus_penultimate
  seeds:
    - 42

  shared:
    output_dir: ./outputs
    logger: wandb
    reusable_artifacts:
      probe_teacher_manifest_path: null
      phate_teacher_target_manifest_path: null
    token_budget: 5000000000
    max_length: 1024
    train_example_offset: 0
    lm_loss_weight: 1.0
    probe:
      size_multiplier: 2
      train_fraction: 0.8
      eval_fraction: 0.2
      sampling: random
      save_ids: false
    diffusion:
      knn: 35
      symmetric: false
      metric: euclidean
    phate:
      knn: 35
      t: auto
      decay: 40
      gamma: 1.0
      fit_fraction: 1.0
      procrustes_align: true
    training:
      precision: bf16
      global_batch_size: 512
      micro_batch_size: 8
      grad_accum_steps: 64
      max_steps: null
      eval_every_n_steps: 1000
      save_every_n_steps: 1000
      save_top_k: 3
      analysis_checkpoint_steps: []
      gradient_clip_norm: 1.0
      train_history_every_n_steps: 10
      staged_training:
        enabled: true
        phase1:
          objective: alignment_only
          min_steps: 500
          max_steps: 5000
          eval_every_n_steps: 100
          early_stop_patience: 5
          early_stop_min_delta: 1.0e-4
        phase2:
          objective: task_only_frozen
          max_steps: 20000
        phase3:
          objective: task_only_unfrozen
          max_steps: 5000
        checkpoint_analysis:
          enabled: true
          phase1_snapshots: 5
          phase2_snapshots: 10
          phase3_snapshots: 5
          include_phase_end: true
    optimizer:
      name: adamw
      learning_rate: 3.0e-4
      betas: [0.9, 0.95]
      eps: 1.0e-8
      weight_decay: 0.1
    lr_scheduler:
      type: cosine
      warmup_steps: 2000
      min_lr: 3.0e-5
    regularization:
      dropout: 0.0
      label_smoothing: 0.0
    alignment:
      loss: mse
      mse_reduction: mean
      batch_size: 16
      eval_batch_size: 8
      sample_every_n_steps: 1
    seeds:
      global_seed: 42
      model_init_seed: null
      data_order_seed: 42
      dataloader_seed: null
      phate_seed: 42

  families:
    pythia:
      family_config: pythia
      teacher:
        model_name_or_path: EleutherAI/pythia-6.9b
        model_revision: main
        trust_remote_code: false
      tokenizer_name: EleutherAI/pythia-410m
      students:
        - key: pythia_410m
          model_name_or_path: EleutherAI/pythia-410m
          model_revision: main
          trust_remote_code: false
          init_from_scratch: true
          penultimate_dim: 1024
          tokenizer_name: EleutherAI/pythia-410m
        - key: pythia_1b
          model_name_or_path: EleutherAI/pythia-1b
          model_revision: main
          trust_remote_code: false
          init_from_scratch: true
          penultimate_dim: 2048
          tokenizer_name: EleutherAI/pythia-1b
        - key: pythia_2_8b
          model_name_or_path: EleutherAI/pythia-2.8b
          model_revision: main
          trust_remote_code: false
          init_from_scratch: true
          penultimate_dim: 2560
          tokenizer_name: EleutherAI/pythia-2.8b

    qwen:
      model_family: causal_lm
      family_config: qwen
      teacher:
        model_name_or_path: Qwen/Qwen2.5-14B
        model_revision: main
        trust_remote_code: true
      tokenizer_name: Qwen/Qwen2.5-0.5B
      students:
        - key: qwen2_5_0_5b
          model_name_or_path: Qwen/Qwen2.5-0.5B
          model_revision: main
          trust_remote_code: true
          init_from_scratch: true
          penultimate_dim: 896
          tokenizer_name: Qwen/Qwen2.5-0.5B
        - key: qwen2_5_1_5b
          model_name_or_path: Qwen/Qwen2.5-1.5B
          model_revision: main
          trust_remote_code: true
          init_from_scratch: true
          penultimate_dim: 1536
          tokenizer_name: Qwen/Qwen2.5-1.5B
        - key: qwen2_5_3b
          model_name_or_path: Qwen/Qwen2.5-3B
          model_revision: main
          trust_remote_code: true
          init_from_scratch: true
          penultimate_dim: 2048
          tokenizer_name: Qwen/Qwen2.5-3B

    bert:
      model_family: masked_lm
      family_config: bert
      teacher:
        model_name_or_path: bert-large-uncased
        model_revision: main
        trust_remote_code: false
      tokenizer_name: bert-base-uncased
      students:
        - key: bert_11m
          model_name_or_path: bert-base-uncased
          model_config_name_or_path: bert-base-uncased
          model_revision: main
          trust_remote_code: false
          init_from_scratch: true
          penultimate_dim: 256
          tokenizer_name: bert-base-uncased
          model_config_overrides:
            hidden_size: 256
            num_hidden_layers: 4
            num_attention_heads: 4
            intermediate_size: 1024
        - key: bert_41m
          model_name_or_path: bert-base-uncased
          model_config_name_or_path: bert-base-uncased
          model_revision: main
          trust_remote_code: false
          init_from_scratch: true
          penultimate_dim: 512
          tokenizer_name: bert-base-uncased
          model_config_overrides:
            hidden_size: 512
            num_hidden_layers: 8
            num_attention_heads: 8
            intermediate_size: 2048
        - key: bert_base
          model_name_or_path: bert-base-uncased
          model_revision: main
          trust_remote_code: false
          init_from_scratch: true
          penultimate_dim: 768
          tokenizer_name: bert-base-uncased

    deberta_v3:
      model_family: masked_lm
      family_config: deberta_v3
      teacher:
        model_name_or_path: microsoft/deberta-v3-large
        model_revision: main
        trust_remote_code: false
      tokenizer_name: microsoft/deberta-v3-base
      students:
        - key: deberta_v3_xsmall
          model_name_or_path: microsoft/deberta-v3-xsmall
          model_revision: main
          trust_remote_code: false
          init_from_scratch: true
          penultimate_dim: 384
          tokenizer_name: microsoft/deberta-v3-base
        - key: deberta_v3_small
          model_name_or_path: microsoft/deberta-v3-small
          model_revision: main
          trust_remote_code: false
          init_from_scratch: true
          penultimate_dim: 768
          tokenizer_name: microsoft/deberta-v3-base
        - key: deberta_v3_base
          model_name_or_path: microsoft/deberta-v3-base
          model_revision: main
          trust_remote_code: false
          init_from_scratch: true
          penultimate_dim: 768
          tokenizer_name: microsoft/deberta-v3-base
