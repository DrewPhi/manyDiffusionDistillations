# @package _global_
# Config-native first stage for representation probe extraction + diffusion artifacts.
#
# Usage:
#   uv run python -m manylatents.main experiment=probe_extraction_pipeline
#
name: probe_extraction_pipeline
project: manylatents_pipeline
seed: 42
debug: false

defaults:
  - override /data: wikitext
  - override /algorithms/lightning: hf_trainer
  - override /trainer: default
  - override /callbacks/trainer: probe
  - override /stage_pipeline: probe_extraction
  - _self_

data:
  tokenizer_name: ${algorithms.lightning.config.model_name_or_path}
  max_length: 128
  batch_size: 8
  probe_n_samples: 1024

algorithms:
  lightning:
    config:
      model_name_or_path: gpt2
      learning_rate: 2e-5
      weight_decay: 0.01
      warmup_steps: 100

trainer:
  max_epochs: 1
  precision: 32
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1
  val_check_interval: 1.0

stage_pipeline:
  stages:
    - name: probe_extraction
      target: manylatents.pipeline.stages.probe_extraction.ProbeExtractionStage
      depends_on: []
      params:
        output_subdir: probe_extraction
        probe_callback_path: callbacks.trainer.probe
        config_overrides:
          logger: null
        diffusion:
          knn: 15
          alpha: 1.0
          symmetric: false
          metric: euclidean
