# @package _global_
# Full wandb logging - syncs to wandb cloud in real-time
# Requires authentication (WANDB_API_KEY) and network connection

logger:
  _target_: wandb.init
  project: ${oc.env:WANDB_PROJECT,${project}}
  name: ${name}
  entity: ${oc.env:WANDB_ENTITY,null}
  mode: ${oc.env:WANDB_MODE,online}
  # config is set programmatically in experiment.py
